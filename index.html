<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Главная | Y.com</title>
    <link rel="stylesheet" href="design/index.css">
</head>
<body>
    <!-- Модальное окно для изображений -->
    <div class="modal" id="imageModal">
        <div class="modal-close">&times;</div>
        <img id="modalImage" src="" alt="">
    </div>

    <div class="layout">
        <!-- Левая панель с навигацией -->
        <aside class="sidebar-left">
            <a href="/" class="logo">Y.com</a>
            <nav class="nav-group">
                <a href="/" class="nav-item active">
                    <svg viewBox="0 0 24 24">
                        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V9z"/>
                        <polyline points="9 22 9 12 15 12 15 22"/>
                    </svg>
                    Главная
                </a>
                <a href="profile.html" class="nav-item">
                    <svg viewBox="0 0 24 24">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                        <circle cx="12" cy="7" r="4"/>
                    </svg>
                    Профиль
                </a>
                <a href="messages.html" class="nav-item">
                    <svg viewBox="0 0 24 24">
                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                    </svg>
                    Сообщения
                </a>
                <a href="ai.html" class="nav-item">
                    <svg viewBox="0 0 24 24">
                        <circle cx="12" cy="12" r="10"/>
                        <path d="M12 8v8M8 12h8"/>
                    </svg>
                    Y-Core
                </a>
                <a href="following.html" class="nav-item">
                    <svg viewBox="0 0 24 24">
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                        <circle cx="9" cy="7" r="4"/>
                        <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                        <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                    </svg>
                    Подписки
                </a>
                <a href="settings.html" class="nav-item">
                    <svg viewBox="0 0 24 24">
                        <circle cx="12" cy="12" r="3"/>
                        <path d="M19.4 15a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H5.78a1.65 1.65 0 0 0-1.51 1 1.65 1.65 0 0 0 .33 1.82l.07.08A10 10 0 0 0 12 17.66a10 10 0 0 0 6.26-2.58z"/>
                        <path d="M16.5 6.5L19 9l-2.5 2.5"/>
                        <path d="M7.5 6.5L5 9l2.5 2.5"/>
                    </svg>
                    Настройки
                </a>
            </nav>
            
            <!-- Форма выхода с перенаправлением на auth.html -->
            <form class="logout-form" id="logoutForm">
                <button type="button" class="btn-main" id="logoutBtn">
                    <svg viewBox="0 0 24 24">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                        <polyline points="16 17 21 12 16 7"/>
                        <line x1="21" y1="12" x2="9" y2="12"/>
                    </svg>
                    Выйти
                </button>
            </form>
            
            <button class="btn-main" id="quickPostBtn">
                <svg viewBox="0 0 24 24">
                    <line x1="12" y1="5" x2="12" y2="19"/>
                    <line x1="5" y1="12" x2="19" y2="12"/>
                </svg>
                Новый пост
            </button>
        </aside>

        <!-- Центральная колонка с контентом -->
        <main class="content">
            <div class="page-header">
                <h1>Главная</h1>
            </div>

            <!-- Редактор поста -->
            <div class="editor">
                <div class="editor-wrapper">
                    <textarea class="editor-textarea" id="postContent" placeholder="Что нового?" rows="3"></textarea>
                    
                    <div id="imagePreviewContainer" class="image-preview-container" style="display: none;"></div>
                    
                    <div class="editor-footer">
                        <div class="editor-tools">
                            <label class="tool-btn">
                                <svg viewBox="0 0 24 24">
                                    <rect x="2" y="2" width="20" height="20" rx="2" ry="2"/>
                                    <circle cx="8.5" cy="8.5" r="1.5"/>
                                    <polyline points="21 15 16 10 5 21"/>
                                </svg>
                                <input type="file" id="imageUpload" accept="image/*" multiple style="display: none;">
                            </label>
                        </div>
                        <button class="editor-submit" id="submitPost">Опубликовать</button>
                    </div>
                </div>
            </div>

            <!-- Лента постов -->
            <section class="feed" id="feed"></section>
        </main>

        <!-- Правая панель -->
        <aside class="sidebar-right">
            <div class="search-container">
                <input type="text" placeholder="Поиск" id="searchInput">
            </div>
            <div class="panel">
                <h3>Актуальное</h3>
                <div class="trend-row">
                    <span class="trend-tag">#Ycom</span>
                    <div class="trend-title">Новая версия</div>
                </div>
                <div class="trend-row">
                    <span class="trend-tag">#Design</span>
                    <div class="trend-title">Минимализм</div>
                </div>
                <div class="trend-row">
                    <span class="trend-tag">#AI</span>
                    <div class="trend-title">Y-Core</div>
                </div>
            </div>
        </aside>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Элементы
            const feed = document.getElementById('feed');
            const postContent = document.getElementById('postContent');
            const submitPost = document.getElementById('submitPost');
            const imageUpload = document.getElementById('imageUpload');
            const imagePreviewContainer = document.getElementById('imagePreviewContainer');
            const quickPostBtn = document.getElementById('quickPostBtn');
            const logoutBtn = document.getElementById('logoutBtn');
            const modal = document.getElementById('imageModal');
            const modalImage = document.getElementById('modalImage');
            const modalClose = document.querySelector('.modal-close');
            
            // Массив для хранения загруженных изображений
            let uploadedImages = [];

            // Функция для перенаправления на страницу auth.html
            function redirectToAuth() {
                // Показываем уведомление о выходе
                showToast('Выход из системы...', 'info');
                
                // Через небольшую задержку перенаправляем на auth.html
                setTimeout(() => {
                    window.location.href = 'auth.html';
                }, 1000);
            }

            // Обработчик для кнопки выхода
            logoutBtn.addEventListener('click', function(e) {
                e.preventDefault();
                redirectToAuth();
            });

            // Функция для отображения уведомлений
            function showToast(message, type = 'success') {
                const existingToasts = document.querySelectorAll('.toast');
                existingToasts.forEach(toast => toast.remove());

                const toast = document.createElement('div');
                toast.className = `toast ${type}`;
                toast.textContent = message;
                document.body.appendChild(toast);
                
                setTimeout(() => {
                    toast.remove();
                }, 3000);
            }

            // Функция для создания поста
            function createPost(author, handle, time, text, images = [], liked = false, comments = []) {
                const post = document.createElement('div');
                post.className = 'post post-new';
                
                const imagesHtml = images.length > 0 ? `
                    <div class="post-images">
                        ${images.map((img, index) => `
                            <div class="post-image ${images.length === 1 ? 'single' : 'multiple'}" data-image="${img}"></div>
                        `).join('')}
                    </div>
                ` : '';

                const commentsHtml = comments.length > 0 ? `
                    <div class="comments-section visible">
                        <div class="comments-list">
                            ${comments.map(comment => `
                                <div class="comment">
                                    <div class="comment-avatar">${comment.avatar}</div>
                                    <div class="comment-content">
                                        <div class="comment-header">
                                            <span class="comment-author">${comment.author}</span>
                                            <span class="comment-time">${comment.time}</span>
                                        </div>
                                        <div class="comment-text">${comment.text}</div>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                        <div class="comment-input-area">
                            <input type="text" class="comment-input" placeholder="Написать комментарий...">
                            <button class="comment-submit">Отправить</button>
                        </div>
                    </div>
                ` : '';

                post.innerHTML = `
                    <div class="post-header">
                        <div class="post-avatar">${author.charAt(0)}</div>
                        <div class="post-author">
                            <div class="post-author-main">
                                <span class="post-author-name">${author} <span class="verified-badge">✓</span></span>
                            </div>
                            <div class="post-author-handle">${handle}</div>
                        </div>
                        <div class="post-time">${time}</div>
                    </div>
                    <div class="post-content">
                        <div class="post-text">${text}</div>
                        ${imagesHtml}
                        <div class="post-actions">
                            <button class="action-btn">
                                <svg viewBox="0 0 24 24">
                                    <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
                                </svg>
                                <span>12</span>
                            </button>
                            <button class="action-btn ${liked ? 'liked' : ''}">
                                <svg viewBox="0 0 24 24">
                                    <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
                                </svg>
                                <span>24</span>
                            </button>
                            <button class="action-btn">
                                <svg viewBox="0 0 24 24">
                                    <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/>
                                    <polyline points="16 6 12 2 8 6"/>
                                    <line x1="12" y1="2" x2="12" y2="15"/>
                                </svg>
                            </button>
                        </div>
                        ${commentsHtml}
                    </div>
                `;

                return post;
            }

            // Загрузка демо-постов
            function loadDemoPosts() {
                const demoPosts = [
                    {
                        author: 'Алексей Морозов',
                        handle: '@alex_morozov',
                        time: '2ч',
                        text: 'Работа над новым дизайном для Y.com. Стремлюсь к чистоте и функциональности. Что думаете?',
                        images: ['demo1'],
                        liked: false,
                        comments: [
                            {
                                avatar: 'A',
                                author: 'Анна Петрова',
                                time: '1ч',
                                text: 'Отлично выглядит!'
                            }
                        ]
                    },
                    {
                        author: 'Tech Analytics',
                        handle: '@tech_data',
                        time: '5ч',
                        text: 'Новая модель Y-Core показывает впечатляющие результаты в анализе данных. Скоро расскажем подробности.',
                        images: [],
                        liked: true,
                        comments: []
                    },
                    {
                        author: 'Елена Владимирова',
                        handle: '@elena_design',
                        time: 'вчера',
                        text: 'Минимализм — это не про то, чтобы убрать всё. Это про то, чтобы оставить только нужное.',
                        images: [],
                        liked: false,
                        comments: []
                    }
                ];

                demoPosts.forEach(post => {
                    feed.appendChild(createPost(
                        post.author,
                        post.handle,
                        post.time,
                        post.text,
                        post.images,
                        post.liked,
                        post.comments
                    ));
                });
            }

            loadDemoPosts();

            // Обработка загрузки изображений
            imageUpload.addEventListener('change', function(e) {
                const files = Array.from(e.target.files);
                
                files.forEach(file => {
                    if (file.type.startsWith('image/')) {
                        const reader = new FileReader();
                        
                        reader.onload = function(e) {
                            uploadedImages.push(e.target.result);
                            updateImagePreview();
                        };
                        
                        reader.readAsDataURL(file);
                    }
                });
            });

            // Обновление превью изображений
            function updateImagePreview() {
                if (uploadedImages.length > 0) {
                    imagePreviewContainer.style.display = 'flex';
                    imagePreviewContainer.innerHTML = '';
                    
                    uploadedImages.forEach((image, index) => {
                        const preview = document.createElement('div');
                        preview.className = 'image-preview';
                        preview.innerHTML = `
                            <img src="${image}" alt="Preview">
                            <div class="remove-image" data-index="${index}">&times;</div>
                        `;
                        imagePreviewContainer.appendChild(preview);
                    });
                    
                    // Добавление обработчиков для удаления
                    document.querySelectorAll('.remove-image').forEach(btn => {
                        btn.addEventListener('click', function() {
                            const index = parseInt(this.dataset.index);
                            uploadedImages.splice(index, 1);
                            updateImagePreview();
                        });
                    });
                } else {
                    imagePreviewContainer.style.display = 'none';
                }
            }

            // Публикация поста
            submitPost.addEventListener('click', function() {
                const text = postContent.value.trim();
                
                if (!text && uploadedImages.length === 0) {
                    showToast('Напишите что-нибудь или добавьте изображение', 'error');
                    return;
                }
                
                const newPost = createPost(
                    'Вы',
                    '@username',
                    'только что',
                    text,
                    uploadedImages,
                    false,
                    []
                );
                
                feed.insertBefore(newPost, feed.firstChild);
                
                // Очистка
                postContent.value = '';
                uploadedImages = [];
                updateImagePreview();
                imageUpload.value = '';
                
                showToast('Пост опубликован!', 'success');
                
                // Прокрутка к новому посту
                newPost.scrollIntoView({ behavior: 'smooth', block: 'center' });
            });

            // Кнопка "Новый пост" в левой панели
            quickPostBtn.addEventListener('click', function() {
                postContent.focus();
                postContent.scrollIntoView({ behavior: 'smooth' });
            });

            // Обработка кликов на изображениях (для модального окна)
            document.addEventListener('click', function(e) {
                if (e.target.closest('.post-image')) {
                    const imageDiv = e.target.closest('.post-image');
                    if (imageDiv.style.backgroundImage) {
                        showToast('Просмотр изображений будет доступен в следующем обновлении', 'info');
                    }
                }
            });

            // Обработка лайков
            document.addEventListener('click', function(e) {
                const likeBtn = e.target.closest('.action-btn:nth-child(2)');
                if (likeBtn) {
                    likeBtn.classList.toggle('liked');
                    const countSpan = likeBtn.querySelector('span');
                    let count = parseInt(countSpan.textContent);
                    count = likeBtn.classList.contains('liked') ? count + 1 : count - 1;
                    countSpan.textContent = count;
                }
            });

            // Обработка комментариев
            document.addEventListener('click', function(e) {
                if (e.target.classList.contains('comment-submit')) {
                    const input = e.target.previousElementSibling;
                    const text = input.value.trim();
                    
                    if (text) {
                        const commentsList = e.target.closest('.comments-section').querySelector('.comments-list');
                        const newComment = document.createElement('div');
                        newComment.className = 'comment';
                        newComment.innerHTML = `
                            <div class="comment-avatar">В</div>
                            <div class="comment-content">
                                <div class="comment-header">
                                    <span class="comment-author">Вы</span>
                                    <span class="comment-time">только что</span>
                                </div>
                                <div class="comment-text">${text}</div>
                            </div>
                        `;
                        commentsList.appendChild(newComment);
                        input.value = '';
                        
                        showToast('Комментарий добавлен', 'success');
                    }
                }
            });

            // Поиск (имитация)
            const searchInput = document.getElementById('searchInput');
            searchInput.addEventListener('input', function(e) {
                const query = e.target.value.trim();
                if (query) {
                    showToast(`Поиск: ${query}`, 'info');
                }
            });

            // Модальное окно
            modalClose.addEventListener('click', function() {
                modal.classList.remove('active');
            });

            modal.addEventListener('click', function(e) {
                if (e.target === modal) {
                    modal.classList.remove('active');
                }
            });
        });
    </script>
</body>
</html>
